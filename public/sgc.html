<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SGC Admin Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0a0a;
      --card:    #141414;
      --card2:   #1c1c1c;
      --border:  #2a2a2a;
      --text:    #f0f0f0;
      --text2:   #888;
      --text3:   #555;
      --gold:    #C9A84C;
      --gold2:   #E8C56A;
      --radius:  14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOP BAR ── */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--card);
    }
    .top-bar-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .top-bar-info { flex: 1; }
    .top-bar-title { font-size: 16px; font-weight: 700; }
    .top-bar-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }
    .online-dot {
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── CHAT FEED ── */
    #feed {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    #feed::-webkit-scrollbar { width: 3px; }
    #feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg { display: flex; max-width: 88%; }
    .msg-user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-assistant { align-self: flex-start; }

    .bubble {
      padding: 11px 15px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.55;
      max-width: 100%;
    }
    .msg-user .bubble {
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: #000;
      font-weight: 500;
      border-bottom-right-radius: 4px;
    }
    .msg-assistant .bubble {
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    /* typing indicator */
    .typing-bubble { display: flex; gap: 5px; align-items: center; padding: 14px 18px; }
    .typing-bubble span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text2);
      animation: bounce 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: .2s; }
    .typing-bubble span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%          { transform: translateY(-6px); }
    }

    /* ── QUICK CHIPS ── */
    #chips {
      padding: 0 16px 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .chip {
      padding: 7px 13px;
      border-radius: 20px;
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text2);
      font-size: 12px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
      white-space: nowrap;
    }
    .chip:hover { border-color: var(--gold); color: var(--gold); }

    /* ── INPUT AREA ── */
    .input-bar {
      padding: 12px 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
      background: var(--card);
    }
    #msgInput {
      flex: 1;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 14px;
      color: var(--text);
      font-size: 14px;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
    }
    #msgInput:focus { border-color: var(--gold); }
    #msgInput::placeholder { color: var(--text3); }

    #sendBtn {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      transition: opacity .15s;
    }
    #sendBtn:hover { opacity: .85; }
    #sendBtn:disabled { opacity: .4; cursor: default; }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-bar-icon">🏗️</div>
    <div class="top-bar-info">
      <div class="top-bar-title">SGC Admin Assistant</div>
      <div class="top-bar-sub">Swartz General Contracting</div>
    </div>
    <div id="qbStatus" style="margin-right:10px"></div>
    <div class="online-dot"></div>
  </div>

  <!-- CHAT FEED -->
  <div id="feed"></div>

  <!-- QUICK CHIPS -->
  <div id="chips">
    <button class="chip" onclick="quickSend('Which subs are missing their W9?')">Missing W9s</button>
    <button class="chip" onclick="quickSend('Prep my Monday Dashboard summary')">Monday Dashboard</button>
    <button class="chip" onclick="quickSend('What jobs are currently in progress?')">Active Jobs</button>
    <button class="chip" onclick="quickSend('Which insurance tasks are not started?')">Insurance Tasks</button>
    <button class="chip" onclick="quickSend('Show me uncategorized bank transactions')">Bank Transactions</button>
  </div>

  <!-- INPUT BAR -->
  <div class="input-bar">
    <textarea id="msgInput"
      placeholder="Ask anything about jobs, subs, expenses, payroll..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button id="sendBtn" onclick="sendMessage()">➤</button>
  </div>

<script>
  const feed    = document.getElementById('feed');
  const input   = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');
  let history   = [];
  let busy      = false;

  // ── QuickBooks status ──────────────────────────────────────────────────────
  async function checkQBStatus() {
    try {
      const res  = await fetch('/api/sgc/quickbooks/status');
      const data = await res.json();
      const el   = document.getElementById('qbStatus');
      if (data.connected) {
        el.innerHTML = `<span style="font-size:12px;color:#4ade80;display:flex;align-items:center;gap:5px">
          <span style="width:7px;height:7px;border-radius:50%;background:#4ade80;display:inline-block"></span>
          QB Connected
        </span>`;
      } else {
        el.innerHTML = `<a href="/api/sgc/quickbooks/connect" target="_blank"
          style="font-size:12px;background:#2a7a2a;color:#fff;padding:5px 12px;border-radius:8px;text-decoration:none;font-weight:600"
          onclick="setTimeout(checkQBStatus, 5000)">Connect QB</a>`;
      }
    } catch (_) {}
  }
  checkQBStatus();

  // Welcome message
  addMsg('assistant', "Hi Serene! I'm your SGC admin assistant. I have access to your job tracker, subcontractor list, bank transactions, insurance tasks, and payroll records.\n\nWhat do you need help with today?");

  function addMsg(role, text) {
    const div = document.createElement('div');
    div.className = 'msg msg-' + role;
    div.innerHTML = `<div class="bubble">${format(text)}</div>`;
    feed.appendChild(div);
    feed.scrollTop = feed.scrollHeight;
    return div;
  }

  function format(text) {
    return text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'msg msg-assistant';
    div.id = 'typing';
    div.innerHTML = '<div class="bubble typing-bubble"><span></span><span></span><span></span></div>';
    feed.appendChild(div);
    feed.scrollTop = feed.scrollHeight;
  }

  function removeTyping() {
    document.getElementById('typing')?.remove();
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function quickSend(text) {
    if (busy) return;
    input.value = text;
    sendMessage();
  }

  async function sendMessage() {
    const msg = input.value.trim();
    if (!msg || busy) return;

    busy = true;
    sendBtn.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    addMsg('user', msg);
    history.push({ role: 'user', content: msg });

    showTyping();

    try {
      const res = await fetch('/api/sgc/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ message: msg, history: history.slice(-6) }),
      });

      removeTyping();

      if (res.status === 401) {
        window.location.href = '/';
        return;
      }

      const data = await res.json();
      const reply = data.reply || data.error || 'Something went wrong.';
      addMsg('assistant', reply);
      history.push({ role: 'assistant', content: reply });

    } catch (err) {
      removeTyping();
      addMsg('assistant', '⚠️ Could not reach the assistant. Check your connection.');
    }

    busy = false;
    sendBtn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
