<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:#F5F0EB;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }

  .wrap{
    width:100%;
    max-width:400px;
  }

  /* Logo / brand */
  .brand{
    text-align:center;
    margin-bottom:32px;
  }
  .brand-icon{
    width:56px;height:56px;
    background:#3D6B35;
    border-radius:16px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    margin-bottom:14px;
  }
  .brand-icon svg{width:28px;height:28px;stroke:#fff;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .brand-name{
    font-size:22px;
    font-weight:800;
    color:#1A1A1A;
    letter-spacing:-.3px;
  }
  .brand-sub{
    font-size:13px;
    color:#8A8A8A;
    margin-top:4px;
  }

  /* Card */
  .card{
    background:#FFFFFF;
    border:1px solid #E5E0DA;
    border-radius:18px;
    padding:32px;
    box-shadow:0 2px 12px rgba(0,0,0,0.06);
  }

  .card-title{
    font-size:18px;
    font-weight:700;
    color:#1A1A1A;
    margin-bottom:6px;
  }
  .card-sub{
    font-size:14px;
    color:#8A8A8A;
    margin-bottom:28px;
  }

  label{
    display:block;
    font-size:11px;
    font-weight:700;
    color:#8A8A8A;
    margin-bottom:8px;
    letter-spacing:.5px;
    text-transform:uppercase;
  }

  input[type=password], input[type=text]{
    width:100%;
    background:#FAF8F5;
    border:1.5px solid #E5E0DA;
    border-radius:10px;
    color:#1A1A1A;
    font-size:16px;
    padding:14px 16px;
    outline:none;
    transition:border-color .15s;
    -webkit-appearance:none;
    box-sizing:border-box;
  }
  input[type=password]:focus, input[type=text]:focus{
    border-color:#4A8C3F;
    box-shadow:0 0 0 3px rgba(74,140,63,0.1);
  }
  input[type=password]::placeholder, input[type=text]::placeholder{
    color:#C0B8AE;
  }

  .error-msg{
    display:none;
    background:#FEF2F2;
    border:1px solid #FECACA;
    border-radius:8px;
    color:#DC2626;
    font-size:13px;
    padding:10px 14px;
    margin-top:14px;
  }
  .error-msg.show{
    display:block;
  }

  .btn{
    display:block;
    width:100%;
    background:#3D6B35;
    color:#FFFFFF;
    font-size:15px;
    font-weight:700;
    padding:15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin-top:20px;
    letter-spacing:.2px;
    transition:opacity .15s,transform .1s;
  }
  .btn:hover{opacity:.9}
  .btn:active{transform:scale(.98)}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  .footer{
    text-align:center;
    margin-top:24px;
    font-size:12px;
    color:#A09890;
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="brand">
    <img src="/assets/landcare-logo.png" alt="LandCare Unlimited" style="width:280px;max-width:90%;height:auto;display:block;margin:0 auto 20px" />
    <div class="brand-sub">Sign in to your operations dashboard</div>
  </div>

  <div class="card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Enter your credentials to access the dashboard.</div>

    <form method="POST" action="/login" id="loginForm">
      <label for="username">Username</label>
      <input
        type="text"
        id="username"
        name="username"
        placeholder="Your username"
        autocomplete="username"
        autofocus
        required
        style="margin-bottom:14px"
      >
      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        name="password"
        placeholder="Enter password"
        autocomplete="current-password"
        required
      >
      <div class="error-msg" id="errorMsg">
        Invalid username or password. Please try again.
      </div>
      <button type="submit" class="btn" id="submitBtn">Sign In</button>
    </form>
  </div>

  <div class="footer">Secure access &middot; Session expires in 7 days</div>
</div>

<script>
  const params = new URLSearchParams(location.search);

  // Forward ?next= through the form so login redirects back to the right page
  const next = params.get('next');
  const form = document.getElementById('loginForm');
  form.action = '/login' + (next ? '?next=' + encodeURIComponent(next) : '');

  // Show error if redirected back with ?error=1
  if (params.get('error') === '1') {
    document.getElementById('errorMsg').classList.add('show');
    document.getElementById('password').focus();
  }

  // Disable button on submit to prevent double-click
  form.addEventListener('submit', function() {
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Signing in\u2026';
  });
</script>
</body>
</html>
