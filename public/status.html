<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Project Status</title>
  <style>
    :root {
      --navy:  #0A2240;
      --gold:  #BF9438;
      --gold2: #d4a84b;
      --bg:    #F4F5F7;
      --card:  #ffffff;
      --text1: #111827;
      --text2: #6B7280;
      --text3: #9CA3AF;
      --green: #22C55E;
      --border: #E5E7EB;
      --r:     12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text1);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: var(--navy);
      padding: 20px 20px 24px;
      text-align: center;
    }
    .company-name {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
    }
    .project-title {
      font-size: 22px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1.2;
    }
    .project-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
    }

    /* ── PROGRESS BANNER ── */
    .progress-banner {
      background: var(--card);
      margin: 16px 16px 0;
      border-radius: var(--r);
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .progress-label { font-size: 13px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }
    .progress-pct { font-size: 22px; font-weight: 800; color: var(--navy); }
    .progress-bar-bg {
      height: 10px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--navy), var(--gold));
      border-radius: 999px;
      transition: width 1s ease;
    }
    .progress-counts { font-size: 12px; color: var(--text2); margin-top: 6px; }

    /* ── STATUS CHIP ── */
    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      margin-top: 12px;
    }
    .status-planning   { background: rgba(191,148,56,.12); color: #92660a; }
    .status-inprogress { background: rgba(10,34,64,.1);    color: var(--navy); }
    .status-complete   { background: rgba(34,197,94,.12);  color: #166534; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }

    /* ── CARDS ── */
    .card {
      background: var(--card);
      margin: 12px 16px 0;
      border-radius: var(--r);
      padding: 18px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .card-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--text2);
      margin-bottom: 14px;
    }

    /* ── DETAIL ROWS ── */
    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-key { font-size: 13px; color: var(--text2); flex-shrink: 0; }
    .detail-val { font-size: 13px; font-weight: 600; color: var(--text1); text-align: right; }

    /* ── PHASES ── */
    .phase-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .phase-row:last-child { border-bottom: none; }
    .phase-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 14px;
    }
    .phase-icon.done    { background: var(--green); color: #fff; }
    .phase-icon.active  { background: var(--navy);  color: #fff; }
    .phase-icon.pending { background: var(--border); color: var(--text2); }
    .phase-info { flex: 1; min-width: 0; }
    .phase-name { font-size: 14px; font-weight: 700; }
    .phase-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .phase-status-tag {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .tag-done    { background: rgba(34,197,94,.12);  color: #166534; }
    .tag-active  { background: rgba(10,34,64,.1);    color: var(--navy); }
    .tag-pending { background: var(--border);        color: var(--text2); }

    /* ── CONTACT ── */
    .contact-card {
      background: var(--navy);
      margin: 12px 16px 0;
      border-radius: var(--r);
      padding: 20px;
    }
    .contact-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: rgba(255,255,255,.5); margin-bottom: 12px; }
    .contact-name  { font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .contact-sub   { font-size: 13px; color: rgba(255,255,255,.6); margin-bottom: 16px; }
    .contact-btns  { display: flex; gap: 10px; }
    .contact-btn {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      display: block;
    }
    .btn-call  { background: var(--gold); color: var(--navy); }
    .btn-email { background: rgba(255,255,255,.1); color: #fff; border: 1px solid rgba(255,255,255,.2); }

    /* ── LAST UPDATE ── */
    .last-update-bar {
      margin: 12px 16px 0;
      background: rgba(34,197,94,.08);
      border: 1px solid rgba(34,197,94,.2);
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 13px;
      color: #166534;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── FOOTER ── */
    .footer {
      text-align: center;
      padding: 24px 16px 32px;
      font-size: 12px;
      color: var(--text3);
    }
    .powered { color: var(--gold); font-weight: 600; }

    /* ── LOADING / ERROR ── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 12px;
      color: var(--text2);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      padding: 32px;
      text-align: center;
    }
    .error-icon { font-size: 48px; margin-bottom: 12px; }
    .error-title { font-size: 20px; font-weight: 800; color: var(--text1); margin-bottom: 8px; }
    .error-sub { font-size: 14px; color: var(--text2); }

    /* ── PHOTO GALLERY ── */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 12px;
    }
    .photo-thumb {
      aspect-ratio: 4/3;
      border-radius: 8px;
      object-fit: cover;
      width: 100%;
      cursor: pointer;
      transition: opacity .15s;
    }
    .photo-thumb:hover { opacity: .85; }
    .photo-caption {
      font-size: 11px;
      color: var(--text2);
      margin-top: 3px;
      text-align: center;
    }
    .photo-lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.9);
      z-index: 999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 20px;
    }
    .photo-lightbox.open { display: flex; }
    .lightbox-img {
      max-width: 100%;
      max-height: 80vh;
      border-radius: 10px;
      object-fit: contain;
    }
    .lightbox-caption {
      color: rgba(255,255,255,.7);
      font-size: 13px;
      margin-top: 12px;
    }
    .lightbox-close {
      position: absolute;
      top: 16px;
      right: 20px;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      line-height: 1;
    }

    /* ── AUTO-REFRESH BADGE ── */
    .refresh-badge {
      position: fixed;
      bottom: 20px;
      right: 16px;
      background: var(--navy);
      color: rgba(255,255,255,.7);
      font-size: 11px;
      padding: 6px 12px;
      border-radius: 999px;
      z-index: 100;
    }
  </style>
</head>
<body>

<div id="root"><div class="loading"><div class="spinner"></div><div>Loading your project…</div></div></div>
<div class="refresh-badge" id="refreshBadge" style="display:none">Auto-refreshing</div>

<!-- LIGHTBOX -->
<div class="photo-lightbox" id="lightbox" onclick="closeLightbox()">
  <div class="lightbox-close" onclick="closeLightbox()">✕</div>
  <img class="lightbox-img" id="lightboxImg" src="" alt="">
  <div class="lightbox-caption" id="lightboxCaption"></div>
</div>

<script>
  // Get Job ID from URL: /status/JOB-001
  const jobId = location.pathname.split('/status/')[1]?.split('/')[0]?.toUpperCase();

  function statusClass(s) {
    const sl = (s || '').toLowerCase();
    if (sl.includes('complete') || sl.includes('done')) return 'status-complete';
    if (sl.includes('progress'))                        return 'status-inprogress';
    return 'status-planning';
  }

  function phaseClass(s) {
    const sl = (s || '').toLowerCase();
    if (sl.includes('complete') || sl.includes('done')) return 'done';
    if (sl.includes('progress') || sl.includes('active')) return 'active';
    return 'pending';
  }

  function phaseIcon(s) {
    const c = phaseClass(s);
    if (c === 'done')   return '✓';
    if (c === 'active') return '▶';
    return '·';
  }

  function phaseTagClass(s) {
    const c = phaseClass(s);
    if (c === 'done')   return 'tag-done';
    if (c === 'active') return 'tag-active';
    return 'tag-pending';
  }

  function phaseTagText(s) {
    const c = phaseClass(s);
    if (c === 'done')   return 'Complete';
    if (c === 'active') return 'In Progress';
    return 'Upcoming';
  }

  function fmtDate(d) {
    if (!d) return '—';
    try {
      const dt = new Date(d);
      if (isNaN(dt)) return d;
      return dt.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    } catch { return d; }
  }

  function render(data) {
    const { company, job, phases, progress } = data;
    const statusCls  = statusClass(job.status);
    const statusText = job.status || 'In Progress';

    // Find current active phase
    const activePhase = phases.find(p => phaseClass(p.status) === 'active')
                     || phases.find(p => phaseClass(p.status) === 'pending');

    document.title = `${job.projectType} — ${company.name}`;

    const html = `
      <!-- HEADER -->
      <div class="header">
        <div class="company-name">${company.name}</div>
        <div class="project-title">${job.projectType}</div>
        <div class="project-sub">For ${job.clientName}${job.address ? ' · ' + job.address : ''}</div>
      </div>

      <!-- LAST UPDATE -->
      ${job.lastUpdate ? `
        <div class="last-update-bar">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
          <span>Last updated ${job.lastUpdate}</span>
        </div>
      ` : ''}

      <!-- PROGRESS -->
      <div class="progress-banner">
        <div class="progress-top">
          <span class="progress-label">Overall Progress</span>
          <span class="progress-pct">${progress.pct}%</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
        </div>
        <div class="progress-counts">${progress.complete} of ${progress.total} phases complete</div>
        <div class="${statusCls} status-chip">
          <div class="status-dot"></div>
          ${statusText}
        </div>
      </div>

      <!-- PROJECT DETAILS -->
      <div class="card">
        <div class="card-title">Project Details</div>
        <div class="detail-row">
          <span class="detail-key">Project</span>
          <span class="detail-val">${job.projectType}</span>
        </div>
        ${job.startDate ? `
        <div class="detail-row">
          <span class="detail-key">Start Date</span>
          <span class="detail-val">${fmtDate(job.startDate)}</span>
        </div>` : ''}
        ${job.endDate ? `
        <div class="detail-row">
          <span class="detail-key">Est. Completion</span>
          <span class="detail-val">${fmtDate(job.endDate)}</span>
        </div>` : ''}
        ${activePhase ? `
        <div class="detail-row">
          <span class="detail-key">Current Phase</span>
          <span class="detail-val" style="color:var(--navy)">${activePhase.name}</span>
        </div>` : ''}
        <div class="detail-row">
          <span class="detail-key">Job ID</span>
          <span class="detail-val" style="color:var(--text2)">${job.id}</span>
        </div>
      </div>

      <!-- PHASES -->
      ${phases.length > 0 ? `
      <div class="card">
        <div class="card-title">Project Phases</div>
        ${phases.map(p => `
          <div class="phase-row">
            <div class="phase-icon ${phaseClass(p.status)}">${phaseIcon(p.status)}</div>
            <div class="phase-info">
              <div class="phase-name">${p.name}</div>
              <div class="phase-meta">${p.trade || ''}${p.end ? ' · Est. ' + fmtDate(p.end) : ''}</div>
            </div>
            <div class="phase-status-tag ${phaseTagClass(p.status)}">${phaseTagText(p.status)}</div>
          </div>
        `).join('')}
      </div>` : ''}

      <!-- OUTSTANDING INVOICES / PAY NOW -->
      ${data.outstandingInvoices && data.outstandingInvoices.length ? `
      <div class="card" style="background:linear-gradient(135deg,rgba(45,122,30,0.03),rgba(45,122,30,0.08));border:1px solid rgba(45,122,30,0.2)">
        <div class="card-title" style="color:var(--gold)">Payment Due</div>
        ${data.outstandingInvoices.map(inv => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)">
            <div>
              <div style="font-weight:700;color:var(--text1);text-transform:capitalize">${inv.type} Payment</div>
              ${inv.dueDate ? `<div style="font-size:12px;color:var(--text2);margin-top:2px">Due ${fmtDate(inv.dueDate)}</div>` : ''}
            </div>
            <div style="text-align:right">
              <div style="font-size:20px;font-weight:800;color:var(--gold)">$${Number(inv.amount).toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2})}</div>
            </div>
          </div>
        `).join('')}
        <a href="/pay/${job.id}" style="display:block;margin-top:12px;background:var(--gold);color:#fff;text-align:center;padding:14px;border-radius:10px;font-weight:700;font-size:15px;text-decoration:none">Pay Now →</a>
      </div>` : ''}

      <!-- YOUR PROJECT TEAM -->
      ${data.team ? `
      <div class="card">
        <div class="card-title">Your Project Team</div>
        <div style="display:flex;align-items:center;gap:14px;padding:10px 0">
          <div style="width:44px;height:44px;border-radius:50%;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0">${(data.team.projectManager || '').split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase()}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;color:var(--text1)">${data.team.projectManager}</div>
            <div style="font-size:12px;color:var(--text2);margin-top:2px">Project Manager · Your main contact</div>
          </div>
        </div>
        ${data.team.crew.length ? `
          <div style="font-size:12px;color:var(--text3);margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
            Crew on this project: <strong style="color:var(--text2)">${data.team.crew.join(', ')}</strong>
          </div>
        ` : ''}
      </div>` : ''}

      <!-- NEXT UP -->
      ${data.nextUp ? `
      <div class="card">
        <div class="card-title">What's Next</div>
        <div style="padding:10px 0">
          <div style="font-size:17px;font-weight:700;color:var(--text1);margin-bottom:4px">${data.nextUp.name}</div>
          <div style="font-size:13px;color:var(--text2)">
            ${data.nextUp.trade ? 'Assigned to <strong>' + data.nextUp.trade + '</strong>' : 'Crew TBD'}${data.nextUp.start ? ' · Starts ' + fmtDate(data.nextUp.start) : ''}
          </div>
        </div>
      </div>` : ''}

      <!-- DOCUMENTS -->
      ${data.documents && data.documents.length ? `
      <div class="card">
        <div class="card-title">Your Documents</div>
        ${data.documents.map(d => `
          <a href="${d.url}" target="_blank" style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);text-decoration:none;color:inherit">
            <div>
              <div style="font-weight:700;color:var(--text1)">${d.name}</div>
              ${d.status ? `<div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px">${d.status}</div>` : ''}
            </div>
            <span style="color:var(--gold);font-weight:700;font-size:13px">View →</span>
          </a>
        `).join('')}
      </div>` : ''}

      <!-- PHOTO GALLERY (injected async) -->
      <div id="photoSection"></div>

      <!-- CONTACT -->
      <div class="contact-card">
        <div class="contact-title">Questions? We're here.</div>
        <div class="contact-name">${company.name}</div>
        <div class="contact-sub">Reach out anytime — we're happy to help.</div>
        <div class="contact-btns">
          ${company.phone ? `<a class="contact-btn btn-call" href="tel:${company.phone}"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px;vertical-align:middle"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>Call Us</a>` : ''}
          ${company.email ? `<a class="contact-btn btn-email" href="mailto:${company.email}"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px;vertical-align:middle"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>Email</a>` : ''}
        </div>
      </div>

      <div class="footer">
        <div>This page updates automatically as your project progresses.</div>
        <div style="margin-top:6px">Powered by <span class="powered">${company.name || 'Your Contractor'}</span></div>
      </div>
    `;

    document.getElementById('root').innerHTML = html;

    // Animate progress bar
    setTimeout(() => {
      const fill = document.getElementById('progressFill');
      if (fill) fill.style.width = progress.pct + '%';
    }, 100);

    // Load photos async
    loadPhotos(job.id);
  }

  function renderError(msg) {
    document.getElementById('root').innerHTML = `
      <div class="error-state">
        <div class="error-icon"><svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
        <div class="error-title">Project not found</div>
        <div class="error-sub">${msg || 'We couldn\'t find a project with that ID. Please check the link and try again.'}</div>
      </div>
    `;
  }

  async function load() {
    if (!jobId) { renderError('No job ID in URL.'); return; }
    try {
      const res  = await fetch(`/api/status/${jobId}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Not found');
      render(data);
    } catch (e) {
      renderError(e.message);
    }
  }

  function openLightbox(url, caption) {
    document.getElementById('lightboxImg').src = url;
    document.getElementById('lightboxCaption').textContent = caption || '';
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
  }

  async function loadPhotos(jobId) {
    try {
      const res    = await fetch(`/api/jobs/${jobId}/photos`);
      const photos = await res.json();
      const section = document.getElementById('photoSection');
      if (!section || !photos?.length) return;
      section.innerHTML = `
        <div class="card">
          <div class="card-title">Job Site Photos</div>
          <div class="photo-grid">
            ${photos.map(p => `
              <div>
                <img class="photo-thumb" src="${p.photoUrl}" alt="${p.caption || 'Job photo'}"
                     onclick="openLightbox('${p.photoUrl}', '${(p.caption || p.timestamp || '').replace(/'/g,'&#39;')}')">
                ${p.caption ? `<div class="photo-caption">${p.caption}</div>` : ''}
              </div>
            `).join('')}
          </div>
        </div>
      `;
    } catch (_) {}
  }

  // Load on page open
  load();

  // Auto-refresh every 5 minutes
  const badge = document.getElementById('refreshBadge');
  setInterval(() => {
    badge.style.display = 'block';
    load().finally(() => {
      setTimeout(() => { badge.style.display = 'none'; }, 2000);
    });
  }, 5 * 60 * 1000);
</script>
</body>
</html>
